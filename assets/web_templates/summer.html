<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Summer Vitality</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style>body{font-family:Inter,system-ui,Arial;background:#adcebd;color:#163428;}</style>
</head>
<body>
  <main class="p-8 max-w-3xl mx-auto">
    <header class="mb-6">
      <h1 class="text-4xl">Micro Journal — Summer Vitality</h1>
      <p class="text-sm">A bright, open theme for energetic reflections.</p>
    </header>
    <section class="bg-white/60 p-6 rounded-2xl">
      <textarea placeholder="Write your reflection here..." maxlength="200" style="width:100%;min-height:180px;padding:12px;border-radius:12px;border:1px solid #eee;background:transparent;"></textarea>
      <div class="mt-4 flex justify-between items-center">
        <span class="text-xs text-primary/40">0/200</span>
        <button style="background:#2d4b3e;color:white;padding:10px 20px;border-radius:999px;border:none;">Save</button>
      </div>
    </section>
  </main>
</body>
</html>
