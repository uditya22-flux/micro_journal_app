<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Winter Calm</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style>body{font-family:Inter,system-ui,Arial;background:#EEF2FF;color:#1E293B;}</style>
</head>
<body>
  <main class="p-8 max-w-3xl mx-auto">
    <header class="mb-6 text-center">
      <h1 class="text-4xl font-playfair">Micro Journal — Winter Calm</h1>
      <p class="text-sm text-winter-navy/60">A cool, minimal theme for quiet reflection.</p>
    </header>
    <section class="glass-card p-6 rounded-2xl">
      <h2 class="text-2xl mb-2">Winter Silence</h2>
      <textarea placeholder="Capture your thought..." maxlength="200" style="width:100%;min-height:180px;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.4);background:transparent;color:#1E293B"></textarea>
      <div class="mt-4 flex justify-between items-center">
        <span class="text-xs text-winter-navy/40">0 / 200</span>
        <button style="background:#1E293B;color:white;padding:10px 20px;border-radius:999px;border:none;">Save</button>
      </div>
    </section>
  </main>
</body>
</html>
