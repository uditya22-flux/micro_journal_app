<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rainy Reflection</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style>body{font-family:Inter,system-ui,Arial;background:#121417;color:#faf9f7;}</style>
</head>
<body>
  <main class="p-8 max-w-3xl mx-auto">
    <header class="mb-6">
      <h1 class="text-4xl">Micro Journal — Rainy Reflection</h1>
      <p class="text-sm text-white/70">A dark, meditative theme for rainy days.</p>
    </header>
    <section class="p-6 rounded-2xl bg-[rgba(255,255,255,0.03)]">
      <textarea placeholder="What's on your mind today?" maxlength="200" style="width:100%;min-height:160px;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#fff"></textarea>
      <div class="mt-4 flex justify-between items-center">
        <span class="text-xs text-white/50">0 / 200</span>
        <button style="background:#60A5FA;color:#081126;padding:10px 20px;border-radius:999px;border:none;">Save</button>
      </div>
    </section>
  </main>
</body>
</html>
