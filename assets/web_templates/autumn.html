<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Autumn Warmth</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style>body{font-family:Inter,system-ui,Arial;background:#faf9f7;color:#163428;}</style>
</head>
<body>
  <main class="p-8 max-w-3xl mx-auto">
    <header class="mb-6">
      <h1 class="text-4xl font-serif">Micro Journal — Autumn Warmth</h1>
      <p class="text-sm text-primary/60">A warm, layered seasonal theme for reflective journaling.</p>
    </header>
    <section class="bg-white/80 p-6 rounded-2xl shadow-lg">
      <h2 class="text-2xl mb-2">Today</h2>
      <p class="text-sm text-primary/70">October 24, 2023</p>
      <textarea placeholder="What's on your mind?..." maxlength="200" style="width:100%;min-height:200px;margin-top:12px;padding:12px;border-radius:12px;border:1px solid #eee;background:transparent;"></textarea>
      <div class="mt-4 flex justify-between items-center">
        <span class="text-xs text-primary/40">0/200</span>
        <button style="background:#2d4b3e;color:white;padding:10px 20px;border-radius:999px;border:none;">SAVE</button>
      </div>
    </section>
  </main>
</body>
</html>
